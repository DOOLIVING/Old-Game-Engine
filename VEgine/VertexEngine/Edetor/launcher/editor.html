<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vertex Editor Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #141414;
            --accent: #00a2ff;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.05);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .content {
            width: 100%;
            max-width: 300px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .logo span {
            color: var(--accent);
        }
        
        .progress-container {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.1s linear;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="logo">VERTEX <span>ENGINE</span></div>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>

    <script>
        const bar = document.getElementById('progress');
        let progress = 0;
        const duration = 5000; // Ровно 5 секунд
        const step = 50; 
        const increment = (100 / (duration / step));

        const timer = setInterval(() => {
            progress += increment;
            if (progress > 100) progress = 100;
            
            bar.style.width = progress + '%';

            if (progress >= 100) {
                clearInterval(timer);
                // Небольшая задержка перед переходом для визуального завершения
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 300);
            }
        }, step);
    </script>
</body>
</html>
